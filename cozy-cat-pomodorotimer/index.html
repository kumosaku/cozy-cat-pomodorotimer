<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cozy-cat-pomodorotimer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="timer-display">
    <div id="phase-label">スタンバイ</div>
    <div id="time">25:00</div>
    <div id="pomodoro-dots"></div>
  </div>

  <div id="break-overlay">
    <div class="break-subtitle">脳のリラックスタイム</div>
    <div class="break-main">5分休憩中</div>
  </div>

  <div id="speech-bubble"></div>

  <div id="separator"></div>

  <div id="controls">
    <button id="btn-focus">集中スタート</button>
    <button id="btn-reset">やり直し</button>
    <button id="btn-break">休憩スタート</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
